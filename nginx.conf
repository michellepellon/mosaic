server {
    listen 3000;
    root /usr/share/nginx/html;
    index dashboard.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve .duckdb files as binary
    location ~* \.duckdb$ {
        types { application/octet-stream duckdb; }
        add_header Cache-Control "no-cache";
    }
}
